<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fintrack — Personal Finance</title>
    <script>
      // Apply saved theme before React mounts to prevent flash
      try {
        const keys = Object.keys(localStorage).filter(k => k.startsWith('fintrack_settings_'));
        for (const key of keys) {
          const s = JSON.parse(localStorage.getItem(key) || '{}');
          if (s.theme === 'dark') { document.documentElement.classList.add('dark'); break; }
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
